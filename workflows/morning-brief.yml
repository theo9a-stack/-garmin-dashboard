name: Morning brief

on:
  schedule:
    # 05:30 UTC = 07:30 in Berlin during CEST (summer).
    # Shift to 06:30 UTC when Europe/Berlin switches back to CET (winter).
    - cron: "30 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install garminconnect

      - name: Run morning brief
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 scripts/fetch_and_brief.py --mode morning

      - name: Commit updated data
        run: |
          git config user.name "garmin-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/latest.json docs/data/history.json
          git diff --cached --quiet || git commit -m "Morning brief $(date -u +%Y-%m-%d)"
          git push
