<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://js.puter.com/v2/"></script>
<style>
  :root{
    --bg:#08090B;
    --hairline:rgba(255,255,255,0.09);
    --hairline-soft:rgba(255,255,255,0.05);
    --text:#F2F1EE;
    --muted:#71767D;
    --muted-2:#4B4F54;
    --primed:#3DE8A0;
    --ready:#8FE3B8;
    --moderate:#FFC44D;
    --compromised:#FF6259;
    --deep:#5B7FFF;
    --rem:#B98CFF;
    --light:#4FC7E8;
    --awake:#3A3E44;
    --font: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    color:var(--text);
    font-family:var(--font);
    padding:28px 20px 100px;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;}

  header.top{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;
  }
  .brandmark{font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--muted);}
  .datestamp{font-size:12px;color:var(--muted-2);font-variant-numeric:tabular-nums;}

  .hero{text-align:center;padding:36px 0 28px;}
  .ring-wrap{position:relative;display:inline-block;}
  .ring-score{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:56px;font-weight:800;letter-spacing:-0.03em;
    font-variant-numeric:tabular-nums;line-height:1;
  }
  .ring-score span{font-size:18px;font-weight:600;color:var(--muted);margin-left:2px;}
  .ring-label{
    margin-top:14px;font-size:13px;font-weight:600;text-transform:uppercase;
    letter-spacing:0.08em;
  }

  .insight{
    max-width:480px;margin:22px auto 0;
    font-size:17px;line-height:1.55;color:#D8D6D1;font-weight:400;
  }
  .insight-tag{
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--muted-2);margin-bottom:10px;
  }
  #aiBriefBtn{
    margin-top:16px;padding:9px 18px;border-radius:100px;border:1px solid var(--hairline);
    background:transparent;color:var(--text);font:inherit;font-size:13px;font-weight:600;
    cursor:pointer;
  }
  #aiBriefBtn:hover{border-color:var(--muted);}

  .section{border-top:1px solid var(--hairline);padding:22px 0;}
  .section-label{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--muted-2);margin-bottom:16px;
  }

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);row-gap:20px;}
  .stat{text-align:left;}
  .stat .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;}
  .stat .v .unit{font-size:12px;font-weight:500;color:var(--muted);margin-left:3px;}
  .stat .k{font-size:12px;color:var(--muted);margin-top:3px;}

  .segbar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:var(--hairline-soft);margin-bottom:14px;}
  .segbar div{height:100%;}
  .seg-legend{display:flex;gap:18px;flex-wrap:wrap;}
  .seg-legend .item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .seg-legend .dot{width:8px;height:8px;border-radius:50%;}

  .load-track{position:relative;height:8px;border-radius:5px;margin-bottom:12px;
    background:linear-gradient(90deg, var(--compromised) 0%, var(--compromised) 15%, var(--primed) 30%, var(--primed) 65%, var(--compromised) 78%, var(--compromised) 100%);
    opacity:0.85;
  }
  .load-marker{position:absolute;top:-4px;width:2px;height:16px;background:var(--text);border-radius:1px;}
  .load-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--muted-2);margin-bottom:14px;}
  .load-readout{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
  .load-readout .band{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-left:10px;}

  canvas{max-width:100%;}

  .brief-row{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px solid var(--hairline-soft);gap:12px;}
  .brief-row:last-child{border-bottom:none;}
  .brief-row .d{font-size:12px;color:var(--muted-2);white-space:nowrap;}
  .brief-row .s{font-size:13px;color:var(--muted);text-align:right;}

  .empty{font-size:13px;color:var(--muted);text-align:center;padding:80px 20px;}
  footer{margin-top:30px;text-align:center;font-size:11px;color:var(--muted-2);}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brandmark">Recovery</div>
    <div class="datestamp" id="datestamp">—</div>
  </header>

  <div id="content">
    <div class="empty">Loading today's readout…</div>
  </div>

  <footer>recalculated from raw Garmin Connect data · not a medical device</footer>
</div>

<script>
const BAND_COLORS = { primed:'var(--primed)', ready:'var(--ready)', moderate:'var(--moderate)', compromised:'var(--compromised)' };

function buildRing(score, band){
  const size = 176, stroke = 12, r = (size - stroke) / 2, c = size/2;
  const circumference = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score ?? 0)) / 100;
  const dash = circumference * pct;
  const color = BAND_COLORS[band] || 'var(--moderate)';
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--hairline)" stroke-width="${stroke}"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"/>
  </svg>`;
}

function loadMarkerPosition(acwr){
  const clamped = Math.max(0, Math.min(2, acwr ?? 1));
  return (clamped/2)*100;
}

function sleepPct(today, key){
  const total = (today.sleep_deep_min||0) + (today.sleep_rem_min||0) + (today.sleep_light_min||0) + (today.sleep_awake_min||0);
  if (!total) return 0;
  return Math.round(((today[key]||0) / total) * 100);
}

async function main(){
  let latest, history;
  try{
    [latest, history] = await Promise.all([
      fetch('data/latest.json').then(r=>r.json()),
      fetch('data/history.json').then(r=>r.json())
    ]);
  }catch(e){
    document.getElementById('content').innerHTML = '<div class="empty">No data yet — waiting on the first scheduled run.</div>';
    return;
  }

  document.getElementById('datestamp').textContent = (latest.updated_at||'').replace('T',' ');

  const today = latest.today || {};
  const recovery = today.recovery || {score:0, band:'moderate'};
  const load = today.load || {};

  const briefText = latest.last_brief || latest.evening_brief || latest.morning_brief || '';
  const briefTag = latest.last_mode
    ? (latest.last_mode === 'morning' ? 'Morning' : 'Evening')
    : (latest.evening_brief ? 'Evening' : 'Morning');

  const markerPct = loadMarkerPosition(load.acwr);
  const intensityTotal = (today.intensity_minutes_moderate ?? 0) + (today.intensity_minutes_vigorous ?? 0);

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="ring-wrap">
        ${buildRing(recovery.score, recovery.band)}
        <div class="ring-score">${recovery.score ?? '—'}<span>/100</span></div>
      </div>
      <div class="ring-label" style="color:${BAND_COLORS[recovery.band]||'var(--moderate)'}">${recovery.band}</div>

      <div class="insight">
        <div class="insight-tag">${briefTag}</div>
        <div id="briefText">${briefText}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Today</div>
      <div class="stat-grid">
        <div class="stat"><div class="v">${today.resting_hr ?? '—'}<span class="unit">bpm</span></div><div class="k">Resting HR</div></div>
        <div class="stat"><div class="v">${today.hrv_avg_ms ?? '—'}<span class="unit">ms</span></div><div class="k">HRV</div></div>
        <div class="stat"><div class="v">${today.sleep_score ?? '—'}</div><div class="k">Sleep score</div></div>
        <div class="stat"><div class="v">${today.sleep_duration_h ?? '—'}<span class="unit">h</span></div><div class="k">Sleep duration</div></div>
        <div class="stat"><div class="v">${today.body_battery_current ?? '—'}</div><div class="k">Battery now</div></div>
        <div class="stat"><div class="v">${today.body_battery_high ?? '—'}</div><div class="k">Battery peak</div></div>
        <div class="stat"><div class="v">${today.steps ?? '—'}</div><div class="k">Steps</div></div>
        <div class="stat"><div class="v">${today.calories_total ?? '—'}<span class="unit">kcal</span></div><div class="k">Calories</div></div>
        <div class="stat"><div class="v">${intensityTotal}<span class="unit">min</span></div><div class="k">Intensity</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Sleep breakdown</div>
      <div class="segbar">
        <div style="width:${sleepPct(today,'sleep_deep_min')}%;background:var(--deep)"></div>
        <div style="width:${sleepPct(today,'sleep_rem_min')}%;background:var(--rem)"></div>
        <div style="width:${sleepPct(today,'sleep_light_min')}%;background:var(--light)"></div>
        <div style="width:${sleepPct(today,'sleep_awake_min')}%;background:var(--awake)"></div>
      </div>
      <div class="seg-legend">
        <div class="item"><span class="dot" style="background:var(--deep)"></span>Deep ${today.sleep_deep_min ?? '—'}m</div>
        <div class="item"><span class="dot" style="background:var(--rem)"></span>REM ${today.sleep_rem_min ?? '—'}m</div>
        <div class="item"><span class="dot" style="background:var(--light)"></span>Light ${today.sleep_light_min ?? '—'}m</div>
        <div class="item"><span class="dot" style="background:var(--awake)"></span>Awake ${today.sleep_awake_min ?? '—'}m</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Training load · 7d : 28d ratio</div>
      <div class="load-track"><div class="load-marker" style="left:${markerPct}%"></div></div>
      <div class="load-scale"><span>0.0 undertrain</span><span>0.8–1.3 sweet spot</span><span>2.0 spike risk</span></div>
      <div class="load-readout">${load.acwr ?? '—'}<span class="band">${load.band ?? ''}</span></div>
    </div>

    <div class="section">
      <div class="section-label">14-day trend</div>
      <canvas id="trendChart" height="110"></canvas>
    </div>

    <div class="section">
      <div class="section-label">Recent</div>
      <div id="briefLog"></div>
    </div>
  `;

  drawTrend(history);
  drawBriefLog(history);
  tryAiBrief(latest);
}

function buildFactsPrompt(latest){
  const today = latest.today || {};
  const recovery = today.recovery || {};
  const load = today.load || {};
  const mode = latest.last_mode === 'morning' ? 'morning' : 'evening';
  const acts = today.activities || [];
  const actDesc = acts.length
    ? acts.map(a => `${a.name || a.type} — ${a.duration_min} min` + (a.avg_hr ? ` @ ${a.avg_hr} bpm avg` : '')).join('; ')
    : 'no logged activity';

  const facts = `Mode: ${mode} brief
Recovery score: ${recovery.score}/100 (${recovery.band}), based on: ${(recovery.components_used||[]).join(', ') || 'no data'}
Training load: ACWR ${load.acwr} (${load.band}), today's TRIMP ${load.daily_trimp}, 7-day avg ${load.acute_7d}, 28-day avg ${load.chronic_28d}
Resting HR: ${today.resting_hr} bpm
HRV: ${today.hrv_avg_ms} ms (device may not support this)
Sleep score: ${today.sleep_score} over ${today.sleep_duration_h}h
Body battery: peak ${today.body_battery_high}, low ${today.body_battery_low}
Steps: ${today.steps}
Today's activities: ${actDesc}`;

  return `Write a short ${mode} training brief (2-4 sentences, plain text, no headers or bullet points) for an athlete. They can already see the raw numbers elsewhere on their dashboard, so do NOT restate figures like "your HRV is X" or "you slept Y hours" — instead, interpret what the numbers actually mean and give one concrete, honest recommendation for today/tomorrow's training. Tone: calibrated and matter-of-fact. No exaggerated caution or doom-y hedging, and no hollow cheerleading or empty positivity — just an honest, grounded read of what the data actually suggests, the way a good coach who respects your intelligence would put it. Base every claim strictly on the data below — never invent anything not given.\n\n${facts}`;
}

async function runAiBrief(latest){
  const target = document.getElementById('briefText');
  const tag = document.querySelector('.insight-tag');
  const btn = document.getElementById('aiBriefBtn');
  if (!target) return;

  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }

  try {
    const prompt = buildFactsPrompt(latest);
    const response = await puter.ai.chat(prompt, { model: 'claude-sonnet-5' });
    const text = (response && response.message && response.message.content && response.message.content[0])
      ? response.message.content[0].text
      : (typeof response === 'string' ? response : null);
    if (text && text.trim()) {
      target.textContent = text.trim();
      if (tag && !tag.textContent.includes('AI')) tag.textContent = tag.textContent + ' · AI';
      if (btn) btn.remove();
    } else {
      throw new Error('Empty response from puter.ai.chat');
    }
  } catch (e) {
    console.warn('AI brief unavailable, showing template text instead.', e);
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'AI brief failed — retry';
      btn.title = e && e.message ? e.message : String(e);
    }
  }
}

function tryAiBrief(latest){
  if (typeof puter === 'undefined') return;
  const insight = document.querySelector('.insight');
  if (!insight) return;

  if (puter.auth && puter.auth.isSignedIn && puter.auth.isSignedIn()) {
    runAiBrief(latest);
    return;
  }

  const btn = document.createElement('button');
  btn.id = 'aiBriefBtn';
  btn.textContent = 'Generate AI brief';
  btn.addEventListener('click', () => runAiBrief(latest));
  insight.appendChild(btn);
}

function drawTrend(history){
  const recent = history.slice(-14);
  const labels = recent.map(r => r.date.slice(5));
  const recoveryData = recent.map(r => (r.recovery||{}).score ?? null);
  const loadData = recent.map(r => (r.load||{}).daily_trimp ?? 0);

  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Recovery',
          data: recoveryData,
          borderColor: '#3DE8A0',
          backgroundColor: 'transparent',
          yAxisID: 'y',
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2.5,
        },
        {
          label: 'Load',
          data: loadData,
          borderColor: '#71767D',
          backgroundColor: 'rgba(113,118,125,0.08)',
          fill: true,
          yAxisID: 'y1',
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 1.5,
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#71767D', boxWidth: 10, font: { size: 11 } } }
      },
      scales: {
        x: { ticks: { color: '#4B4F54', font: { size: 10 } }, grid: { display:false } },
        y: { position: 'left', min:0, max:100, ticks: { color: '#4B4F54', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y1: { position: 'right', min:0, ticks: { display:false }, grid: { display:false } }
      }
    }
  });
}

function drawBriefLog(history){
  const el = document.getElementById('briefLog');
  const recent = history.slice(-6).reverse();
  el.innerHTML = recent.map(r => {
    const rec = r.recovery || {};
    const load = r.load || {};
    return `<div class="brief-row">
      <div class="d">${r.date}</div>
      <div class="s">${rec.score ?? '—'} · ${rec.band ?? '—'} &nbsp;·&nbsp; ACWR ${load.acwr ?? '—'}</div>
    </div>`;
  }).join('') || '<div class="empty">No history yet.</div>';
}

main();
</script>
</body>
</html>
